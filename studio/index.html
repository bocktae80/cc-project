<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>

  <title>Claude Code 학습 스튜디오</title>
  <meta name="description" content="클로드 코드의 기능을 배우고 활용하는 학습 대시보드" />

<body>
  <!-- 스킵 링크 (접근성) -->
  <a href="#app" class="skip-link">메인 콘텐츠로 건너뛰기</a>

  <!-- 헤더 -->
  <header class="header">
    <div class="header__inner">
      <div class="header__brand">
        <div class="header__logo">
          <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="28" height="28" rx="6" fill="url(#logo-grad)"/>
            <path d="M8 14l4 4 8-8" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="logo-grad" x1="0" y1="0" x2="28" y2="28">
                <stop stop-color="#6366F1"/>
                <stop offset="1" stop-color="#A855F7"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="header__title-group">
          <h1 class="header__title">Claude Code 학습 스튜디오</h1>
          <p class="header__subtitle">클로드 코드의 기능을 배우고 활용하는 학습 대시보드</p>
        </div>
      </div>
      <div class="header__controls">
        <div id="level-picker-mount"></div>
        <button class="btn-icon" id="theme-toggle" aria-label="테마 전환">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- 메인 콘텐츠 (JS 동적 생성) -->
  <main id="app" role="main" aria-label="프로젝트 대시보드">
    <noscript>
      <p style="text-align: center; padding: 40px; color: #8B8B9E;">
        JavaScript를 활성화해야 대시보드를 볼 수 있습니다.
      </p>
    </noscript>
  </main>

  <!-- 푸터 -->
  <footer class="footer">
    <div class="container">
      <p>
        <strong>CC Project</strong> — Claude Code 학습 프로젝트
        <br />
        마지막 업데이트: <span id="last-updated">2026-03-02</span>
      </p>
    </div>
  </footer>
